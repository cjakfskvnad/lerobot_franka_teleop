record:
  repo_id: &repo_id "flexiv/eval_act_force_xyz_teleop_20260619_104810_exclude_14_15" 
  # repo_id: &repo_id "PhysBrain/PnP_Veg" 
  # repo_id: &repo_id "scylearning/pick_greencube_into_trashb
  # Suggested format: <hf_username>/<description>, description = task.description -> Verb_SourceObject_prep_TargetObject
  # e.g. Pick up the green cube and put it into the trash bin -> pick_greencube_into_trashbin
  debug: 0 # if True, robot will not execute any actions, but gripper can still be controlled
  user_notes:  # any additional notes about the dataset
  fps: 30 # dataset and camera frame rate
  control_mode: &control_mode "oculus" # "isoteleop" or "spacemouse" or "oculus"
  run_mode: "run_policy" # "run_record" or "run_policy" or "run_mix"

  teleop:
    control_mode: *control_mode 
    dynamixel_config:
      port: "/dev/serial/by-id/usb-1a86_USB_Serial-if00-port0"
      # hardware_offsets: [0, 0, 0, 0, 0, 0, 0] # The Calibration offsets between the master and the slave robot
      hardware_offsets: [-0.12183455210997171, -0.002845966063342931, -0.06250428305273764, -2.0498354593763044, 0.05259129256457092, 1.9984585428810417, -0.9046528345737315] 
      use_gripper: &use_gripper True # whether the slave robot can use gripper
      joint_ids: [0, 1, 2, 3, 4, 5, 6]
      # joint_offsets: [6.283, 3.142, 0.0, 4.712, 4.712, 6.283, 2.496] # franka hand offsets
      joint_offsets: [6.283, 3.142, -6.283, 4.712, -1.571, 6.283, 3.0] # robotiq hand offsets
      joint_signs: [1, 1, 1, 1, 1, -1, 1]
      gripper_config: [7, 0.9664079, 1.9404857] # id, min, max
    spacemouse_config:
      channel_ids: [0, 1, 2, 3, 4, 5]
      channel_signs: [-1, -1, 1, -1, -1, 1]
      use_gripper: *use_gripper # whether the spacemouse robot can use gripper
      pose_scaler: [0.01, 0.05] # scaler for spacemouse actions [position, attitude]
    oculus_config:
      ip: null  # Use USB connection; set to Quest IP address for wireless ADB
      use_gripper: *use_gripper
      log_actions: true
      log_action_period_sec: 0.2
      pose_scaler: [3.0, 1.5]  # scaler for oculus actions [position, attitude]
      channel_signs: [1, 1, 1, -1, -1, 1]  # signs for each axis [x, y, z, rx, ry, rz]
      # channel_signs: [-1, -1, 1, 1, 1, 1] # mirror
    placo:
      visualize_placo: False
      placo_dt: 0.01
      # Placo IK settings for oculus joint mode
      enable_ik: False               # 是否启用 Placo IK 计算关节位置（run_policy 时可设为 False）
      robot_ip: "Rizon4s-063425"    # Flexiv robot serial number for reading current joint states
      robot_port: 4242              # Kept for compatibility, unused by Flexiv RDK
      ik_urdf_path: "assets/franka_urdf/fr3v2_no_mesh.urdf"  # Replace with Flexiv URDF if enabling IK
      ik_iterations: 30              # IK 求解迭代次数，值越大精度越高但更慢（推荐 8~15）
      # ── Placo IK 任务权重 ──────────────────────────────────────────────
      # Placo 将 IK 分解为多个加权"soft"任务，求解器在每次迭代中按权重
      # 优先满足高权重任务。FR3v2 是 7-DOF 冗余臂，需要在末端精度和
      # 关节锚定之间取得平衡：
      #   - pos_weight  较大 → 末端位置跟踪更准，但关节可能偏离当前构型
      #   - joints_weight 较大 → 关节稳定，但末端可能跟不上（尤其前/后方向）
      #   - ori_weight  控制姿态跟踪优先级
      #   - regularization 防止求解器数值奇异，一般无需调整
      ik_pos_weight: 8.0            # 末端位置跟踪权重（主要任务，建议 5~10）
      ik_ori_weight: 3.0            # 末端姿态跟踪权重（建议 0.3~2.0）
      ik_joints_weight: 0.2         # 关节锚定权重，解决 7-DOF 冗余（建议 0.1~1.0）
      ik_regularization: 1.0e-4     # 正则化权重，防止数值奇异（一般不调）
      
  robot:
    robot_sn: &ip "Rizon4s-063425" # Flexiv robot serial number, e.g. Rizon4s-123456
    ip: "Rizon4s-063425" # Backward-compatible alias; robot_sn is used when present
    network_interface:  # Optional local NIC IPv4 used to discover the robot, e.g. "192.168.2.102"
    gripper_name: "Flexiv-GN01" # Flexiv Elements -> Settings -> Device full gripper name; leave empty to disable gripper device init
    gripper_init: true  # Trigger Gripper.Init() after enabling the device
    gripper_init_wait_sec: 5.0
    home_plan: "PLAN-Home"
    home_joints:        # Optional 7 joint angles. If empty, reset uses home_plan instead.
    saved_joint_pose_file: "/home/deepcybo/桌面/flexiv_rdk_v1.9/example_py/saved_joint_pose.json"
    reset_to_home_on_stop: true
    command_frequency: 50
    use_gripper: *use_gripper
    close_threshold: 0.95 # threshold to determine gripper open/close
    gripper_bin_threshold: 0.98 # threshold to determine gripper is closed
    # gripper_port: &gripper_port "/dev/franka_left_gripper" # gripper_port
    gripper_reverse: false  # If gripper moves opposite, flip this value
    gripper_max_open: 0.1 # Flexiv-GN01 max open width in meters
    gripper_force: 40.0 # Flexiv gripper Grasp(force) / Move(..., force) in newtons
    gripper_always_grasp: true # Keep calling Grasp(40) instead of opening/closing by position
    # Execute mode for oculus control: "ee_pose" (cartesian impedance) or "joint" (joint impedance via Placo IK)
    execute_mode: "joint"
    policy_io_schema: "tdk_pose_joint" # Match Flexiv TDK pose+joint policy IO schema
    include_force_observation: true # Add follower XYZ force to observation.state for act_force_xyz
    force_observation_frame: "tcp" # "tcp", "world", or "raw"; checkpoint was trained with TCP force XYZ

  policy:
    type: "act_force_xyz"  # 策略类型 (act, act_force_xyz, diffusion)
    device: "cuda"  # 运行设备 (cuda, cpu)
    push_to_hub: False  # 禁用模型推送
    # pretrained_path: "/home/deepcybo/lerobot/franka_workspace/outputs/lihao-test-0310/diffusion_test1/checkpoints/last/pretrained_model"
    pretrained_path: "/home/deepcybo/桌面/flexiv_rdk_v1.9/outputs/flexiv/act_force_xyz_teleop_20260619_104810_exclude_14_15_010000_pretrained_model"
    # pretrained_path: "/home/deepcybo/lerobot/franka_workspace/outputs/lihao-test/act_test3/checkpoints/020000/pretrained_model"  
    # 预训练模型路径下要包括config.json

  task:
    description: "Flexiv transparent cartesian teleoperation" # task description
    # description: "pick up the red chili and put it into the brown basket" # task description
    # description: "pick up the red chili and put it into the brown basket"
    num_episodes: 1 # number of episodes to record
    display: False # Whether to display the data during recording
    resume: false # whether to resume from an existing dataset
    resume_dataset: roboticiq/pick_all_yellow_cube_to_brown_basket_20260208_v01 # dataset to resume from if resume is True
  
  time:
    episode_time_sec: 120 # max time per episode in seconds
    reset_time_sec: 120 # max time to reset between episodes in seconds
    save_meta_period: 1 # Save metadata after every N episodes

  cameras:
    enabled: true # Set true when RealSense cameras are connected
    wrist_cam_serial: "347622074732" # camera_0 in the training dataset
    exterior_cam_serial: "346522071325" # camera_1 in the training dataset
    width: 640 # 640 424
    height: 480 # 480 360 240

  storage:
    push_to_hub: False # whether to push the dataset to your huggingface repo after recording

replay:
  dataset_name: flexiv/teleop_dataset_20260618_202049_video
  episode_idx: 0 # episode index to replay
  pre_replay_movej: true
  pre_replay_joint_pose_file: "/home/deepcybo/桌面/flexiv_rdk_v1.9/example_py/saved_joint_pose.json"
  pre_replay_movej_velocity: 0.2
  pre_replay_movej_timeout: 120.0
  robot:
    robot_sn: "Rizon4s-063425"
    ip: "Rizon4s-063425"
    network_interface: "192.168.2.112"
    gripper_name: "Flexiv-GN01"
    gripper_init: true
    use_gripper: true
    gripper_force: 40.0
    gripper_always_grasp: true
    execute_mode: "joint"
    policy_io_schema: "tdk_pose_joint"
    # gripper_port: *gripper_port
  control_mode: *control_mode 

visualize:
  dataset_name: babycare/milk_power_20260321_v03
  episode_index: 0 # episode index to visualize
